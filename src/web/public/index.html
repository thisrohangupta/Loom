<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Loom</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%2318181b'/%3E%3Ctext x='16' y='22' font-size='17' text-anchor='middle' fill='%23fafafa' font-family='system-ui'%3E%E2%97%B3%3C/text%3E%3C/svg%3E" />
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="logo">◳</span>
      <div>
        <strong id="ws-name">Loom</strong>
        <span id="ws-desc" class="muted"></span>
      </div>
    </div>
    <div class="topbar-right">
      <div id="ws-switcher" class="ws-switcher"></div>
      <div class="conn">
        <span id="conn-dot" class="dot connecting"></span>
        <span id="conn-label" class="muted">connecting…</span>
      </div>
    </div>
  </header>

  <div class="layout">
    <nav class="sidebar">
      <button class="nav active" data-view="workflows">Workflows</button>
      <button class="nav" data-view="metrics">Metrics</button>
      <button class="nav" data-view="inputs">Inputs</button>
      <button class="nav" data-view="context">Context</button>
      <button class="nav" data-view="prompts">Prompts</button>
      <button class="nav" data-view="artifacts">Artifacts</button>
      <button class="nav" data-view="snapshots">Snapshots</button>
      <button class="nav" data-view="share">Share</button>
      <div class="activity-wrap">
        <div class="activity-title">Activity</div>
        <ul id="activity" class="activity"></ul>
      </div>
    </nav>

    <main id="main"></main>
  </div>

  <script src="/app.js" type="module"></script>
</body>
</html>
